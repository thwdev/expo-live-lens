<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expo Live Lens</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #15171a;
        --muted: #657080;
        --line: #dfe3e8;
        --accent: #1264d8;
        --danger: #b42318;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111316;
          --panel: #191c20;
          --text: #eef1f4;
          --muted: #9aa4b2;
          --line: #2b3037;
          --accent: #6ea8ff;
          --danger: #ff8a7a;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(0, 1fr);
        gap: 16px;
        padding: 16px;
      }

      .panel {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .panel h2 {
        margin: 0;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: var(--muted);
      }

      .preview {
        display: grid;
        place-items: center;
        min-height: 560px;
        padding: 14px;
      }

      .preview img {
        max-width: 100%;
        max-height: 76vh;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      .events {
        height: calc(100vh - 116px);
        overflow: auto;
      }

      .event {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .event strong {
        display: inline-flex;
        align-items: center;
        color: var(--accent);
      }

      .event.error strong {
        color: var(--danger);
      }

      .meta {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
      }

      pre {
        max-height: 220px;
        overflow: auto;
        margin: 8px 0 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: color-mix(in srgb, var(--bg) 82%, var(--panel));
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--panel);
        color: var(--text);
        padding: 8px 10px;
        cursor: pointer;
      }

      button.active {
        border-color: color-mix(in srgb, var(--accent) 55%, var(--line));
        background: color-mix(in srgb, var(--accent) 12%, var(--panel));
        color: var(--accent);
      }

      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }

        .events {
          height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Expo Live Lens</h1>
        <div class="status" id="status">Connecting...</div>
      </div>
      <div class="actions">
        <button id="capture">Request screenshot</button>
        <button id="packet">Copy review packet</button>
        <button id="clearLocal">Clear local view</button>
        <button id="clearServer">Clear server memory</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <h2>Latest Screenshot</h2>
        <div class="preview" id="preview">
          <div class="empty">No screenshot received yet.</div>
        </div>
      </section>

      <section class="panel">
        <h2>Live Events</h2>
        <div class="tabs" id="tabs">
          <button class="active" data-tab="all">All</button>
          <button data-tab="console">Logs</button>
          <button data-tab="network">Network</button>
          <button data-tab="error">Errors</button>
          <button data-tab="screenshot">Screenshots</button>
          <button data-tab="app-state">App</button>
        </div>
        <div class="events" id="events"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const eventsEl = document.getElementById("events");
      const previewEl = document.getElementById("preview");
      const clearLocalButton = document.getElementById("clearLocal");
      const clearServerButton = document.getElementById("clearServer");
      const packetButton = document.getElementById("packet");
      const captureButton = document.getElementById("capture");
      const tabsEl = document.getElementById("tabs");
      const localEvents = [];
      let activeTab = "all";

      clearLocalButton.addEventListener("click", () => {
        localEvents.length = 0;
        render();
      });

      clearServerButton.addEventListener("click", async () => {
        await fetch("/api/events", { method: "DELETE" });
        localEvents.length = 0;
        render();
      });

      packetButton.addEventListener("click", async () => {
        const response = await fetch("/api/review-packet");
        const packet = await response.json();
        const text = JSON.stringify(packet, null, 2);

        if (navigator.clipboard) {
          await navigator.clipboard.writeText(text);
          statusEl.textContent = "Review packet copied";
        } else {
          statusEl.textContent = "Clipboard unavailable; open /api/review-packet";
        }
      });

      captureButton.addEventListener("click", async () => {
        await fetch("/api/capture-request", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({ reason: "dashboard" })
        });
        statusEl.textContent = "Screenshot requested";
      });

      tabsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-tab]");
        if (!button) {
          return;
        }

        activeTab = button.dataset.tab;
        for (const tab of tabsEl.querySelectorAll("button")) {
          tab.classList.toggle("active", tab === button);
        }
        render();
      });

      function formatPayload(payload) {
        if (!payload || Object.keys(payload).length === 0) {
          return "";
        }
        return JSON.stringify(payload, null, 2);
      }

      function render() {
        const latestScreenshot = localEvents.find((event) => event.type === "screenshot" && event.image);
        previewEl.innerHTML = "";

        if (latestScreenshot) {
          const image = document.createElement("img");
          image.alt = "Latest app screenshot";
          image.src = latestScreenshot.image;
          previewEl.appendChild(image);
        } else {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No screenshot received yet.";
          previewEl.appendChild(empty);
        }

        eventsEl.innerHTML = "";
        for (const event of filteredEvents()) {
          const row = document.createElement("article");
          row.className = `event ${event.level === "error" || event.type === "error" ? "error" : ""}`;

          const title = document.createElement("strong");
          title.textContent = event.type || "event";
          row.appendChild(title);

          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = `${event.receivedAt || ""}${event.screenName ? ` | ${event.screenName}` : ""}${event.device ? ` | ${event.device}` : ""}`;
          row.appendChild(meta);

          const payloadText = formatPayload(event.payload);
          if (payloadText) {
            const pre = document.createElement("pre");
            pre.textContent = payloadText;
            row.appendChild(pre);
          }

          eventsEl.appendChild(row);
        }
      }

      function filteredEvents() {
        if (activeTab === "all") {
          return localEvents;
        }

        if (activeTab === "error") {
          return localEvents.filter((event) => event.level === "error" || event.type === "error" || event.type === "network-error");
        }

        if (activeTab === "network") {
          return localEvents.filter((event) => event.type === "network" || event.type === "network-error");
        }

        return localEvents.filter((event) => event.type === activeTab);
      }

      async function loadInitialEvents() {
        const response = await fetch("/api/events");
        const data = await response.json();
        localEvents.splice(0, localEvents.length, ...(data.events || []));
        render();
      }

      function connect() {
        const source = new EventSource("/api/events/stream");

        source.onopen = () => {
          statusEl.textContent = "Connected";
        };

        source.onerror = () => {
          statusEl.textContent = "Reconnecting...";
        };

        source.onmessage = (message) => {
          const event = JSON.parse(message.data);
          if (event.type !== "connected") {
            localEvents.unshift(event);
            localEvents.splice(200);
            render();
          }
        };
      }

      loadInitialEvents().catch((error) => {
        statusEl.textContent = error.message;
      });
      connect();
    </script>
  </body>
</html>
